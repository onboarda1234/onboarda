# =============================================================================
# ARIE Finance — Nginx Reverse Proxy Configuration
# =============================================================================
# Purpose: HTTPS termination, HTTP-to-HTTPS redirect, security headers,
#          and reverse proxying to the Tornado backend.
#
# Usage:
#   1. Install: sudo apt install nginx certbot python3-certbot-nginx
#   2. Copy:    sudo cp nginx.conf /etc/nginx/sites-available/arie-finance
#   3. Link:    sudo ln -s /etc/nginx/sites-available/arie-finance /etc/nginx/sites-enabled/
#   4. Certs:   sudo certbot --nginx -d arie-finance.onrender.com
#   5. Test:    sudo nginx -t
#   6. Reload:  sudo systemctl reload nginx
#
# NOTE: On Render.com, HTTPS termination is handled automatically by the
#       platform. This config is for self-hosted or VPS deployments.
# =============================================================================

# Rate limiting zones
limit_req_zone $binary_remote_addr zone=api_general:10m rate=60r/m;
limit_req_zone $binary_remote_addr zone=api_login:10m rate=10r/m;
limit_req_zone $binary_remote_addr zone=api_upload:10m rate=5r/m;

# ── HTTP → HTTPS redirect ──────────────────────────────────────────────────
server {
    listen 80;
    listen [::]:80;
    server_name arie-finance.onrender.com;

    # ACME challenge for Let's Encrypt certificate renewal
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    # Redirect ALL other HTTP traffic to HTTPS
    location / {
        return 301 https://$host$request_uri;
    }
}

# ── HTTPS server ───────────────────────────────────────────────────────────
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name arie-finance.onrender.com;

    # ── TLS Configuration ──────────────────────────────────────────────
    ssl_certificate     /etc/letsencrypt/live/arie-finance.onrender.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/arie-finance.onrender.com/privkey.pem;

    # Modern TLS only (TLS 1.2+)
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;
    ssl_prefer_server_ciphers off;

    # OCSP stapling
    ssl_stapling on;
    ssl_stapling_verify on;
    resolver 8.8.8.8 8.8.4.4 valid=300s;

    # Session caching
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 1d;
    ssl_session_tickets off;

    # ── Security Headers ───────────────────────────────────────────────
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "DENY" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # ── Request size limits ────────────────────────────────────────────
    client_max_body_size 25M;  # Match FileUploadValidator max size

    # ── Proxy to Tornado backend ───────────────────────────────────────
    location / {
        # Rate limiting
        limit_req zone=api_general burst=20 nodelay;

        proxy_pass http://127.0.0.1:8080;
        proxy_http_version 1.1;

        # Forward real client info to Tornado
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # WebSocket support (if needed later)
        proxy_set_header Upgrade    $http_upgrade;
        proxy_set_header Connection "upgrade";

        # Timeouts
        proxy_connect_timeout 10s;
        proxy_send_timeout    30s;
        proxy_read_timeout    60s;
    }

    # ── Stricter rate limiting for auth endpoints ──────────────────────
    location ~ ^/api/auth/(officer|client)/login$ {
        limit_req zone=api_login burst=5 nodelay;

        proxy_pass http://127.0.0.1:8080;
        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # ── Stricter rate limiting for upload endpoints ────────────────────
    location ~ ^/api/applications/.*/documents$ {
        limit_req zone=api_upload burst=3 nodelay;

        proxy_pass http://127.0.0.1:8080;
        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Larger timeout for file uploads
        proxy_send_timeout 120s;
        proxy_read_timeout 120s;
    }

    # ── Block access to sensitive paths ────────────────────────────────
    location ~ /\. {
        deny all;
        return 404;
    }

    location ~ \.(py|db|sqlite|env|key|pem)$ {
        deny all;
        return 404;
    }
}
