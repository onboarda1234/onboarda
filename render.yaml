# ═══════════════════════════════════════════════════════════════
# Render.com — Blueprint spec for Onboarda / RegMind
# Two services: LIVE (production) and DEMO (demo mode)
# Both auto-deploy on push to main. CI gates merges.
# HTML frontends are copied from repo root into arie-backend/
# at build time (source of truth is repo root).
# Place this at the REPO ROOT (not inside arie-backend/)
# ═══════════════════════════════════════════════════════════════

services:
  # ─────────────────────────────────────────────────────────────
  # 1. LIVE — Production Environment
  # ─────────────────────────────────────────────────────────────
  - type: web
    name: arie-finance-live
    runtime: python
    plan: starter
    rootDir: .
    buildCommand: "cp arie-portal.html arie-backend/arie-portal.html && cp arie-backoffice.html arie-backend/arie-backoffice.html && pip install -r arie-backend/requirements.txt"
    startCommand: cd arie-backend && python3 server.py
    healthCheckPath: /api/health
    autoDeploy: true           # Auto-deploy on push (CI gates merges to main)
    disk:
      name: arie-data-live
      mountPath: /data
      sizeGB: 1
    envVars:
      - key: PORT
        value: 10000
      - key: ENV
        value: production
      - key: SECRET_KEY
        generateValue: true
      - key: JWT_SECRET
        generateValue: true
      - key: DB_PATH
        value: /data/arie.db
      - key: UPLOAD_DIR
        value: /data/uploads
      # ── Required secrets (set manually in Render dashboard) ──
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: ALLOWED_ORIGIN
        sync: false
      - key: CORS_ORIGIN
        sync: false
      - key: DATABASE_URL
        sync: false
      - key: SUMSUB_APP_TOKEN
        sync: false
      - key: SUMSUB_SECRET_KEY
        sync: false
      - key: SUMSUB_WEBHOOK_SECRET
        sync: false
      - key: OPENCORPORATES_API_KEY
        sync: false
      - key: OPENSANCTIONS_API_KEY
        sync: false
      - key: COMPLYADVANTAGE_API_KEY
        sync: false
      - key: S3_BUCKET
        sync: false
      - key: AWS_ACCESS_KEY_ID
        sync: false
      - key: AWS_SECRET_ACCESS_KEY
        sync: false
      # ── Production feature flags (all demo features OFF) ──
      - key: ENABLE_DEMO_MODE
        value: "false"
      - key: ENABLE_MOCK_FALLBACKS
        value: "false"
      - key: ENABLE_SIMULATED_SCREENING
        value: "false"
      - key: ENABLE_DEMO_DATA_SEEDING
        value: "false"
      - key: ENABLE_DEMO_BANNER
        value: "false"
      - key: ENABLE_ROLE_SWITCHER
        value: "false"
      - key: ENABLE_DEBUG_ENDPOINTS
        value: "false"
      - key: ENABLE_SHORTCUT_LOGIN
        value: "false"
      - key: ENABLE_SUMSUB_LIVE
        value: "true"
      - key: ENABLE_REAL_SCREENING
        value: "true"
      # ── Production feature flags (completed features — managed in dashboard) ──
      - key: ENABLE_PHASE2_FEATURES
        sync: false
      - key: ENABLE_MONITORING_DASHBOARD
        sync: false
      - key: ENABLE_REGULATORY_INTELLIGENCE_FULL
        sync: false
      - key: ENABLE_AI_SUPERVISOR
        sync: false
      - key: ENABLE_DOCUMENT_AI_ANALYSIS
        sync: false
      - key: ENABLE_SAR_WORKFLOW
        sync: false

  # ─────────────────────────────────────────────────────────────
  # 2. DEMO — Demo Environment (simulated APIs + sample data)
  # ─────────────────────────────────────────────────────────────
  - type: web
    name: arie-finance-demo
    runtime: python
    plan: starter
    rootDir: .
    buildCommand: "cp arie-portal.html arie-backend/arie-portal.html && cp arie-backoffice.html arie-backend/arie-backoffice.html && pip install -r arie-backend/requirements.txt"
    startCommand: cd arie-backend && python3 server.py
    healthCheckPath: /api/health
    autoDeploy: true           # Auto-deploy on push for demo
    disk:
      name: arie-data-demo
      mountPath: /data
      sizeGB: 1
    envVars:
      - key: PORT
        value: 10000
      - key: ENV
        value: demo
      - key: SECRET_KEY
        generateValue: true
      - key: JWT_SECRET
        generateValue: true    # No hardcoded secrets — even for demo
      - key: DB_PATH
        value: /data/arie_demo.db
      - key: UPLOAD_DIR
        value: /data/uploads
      - key: ALLOWED_ORIGIN
        value: "*"
      - key: CORS_ORIGIN
        value: "*"
      # ── Demo feature flags (all demo features ON) ──
      - key: ENABLE_DEMO_MODE
        value: "true"
      - key: ENABLE_DEMO_BANNER
        value: "true"
      - key: ENABLE_DEMO_DATA_SEEDING
        value: "true"
      - key: ENABLE_MOCK_FALLBACKS
        value: "true"
      - key: ENABLE_ROLE_SWITCHER
        value: "true"
      - key: ENABLE_PHASE2_FEATURES
        value: "true"
      - key: ENABLE_REGULATORY_INTELLIGENCE_FULL
        value: "true"
      - key: ENABLE_MONITORING_DASHBOARD
        value: "true"
      - key: ENABLE_SAR_WORKFLOW
        value: "true"
      - key: ENABLE_AI_SUPERVISOR
        value: "true"
      - key: ENABLE_KPI_DEMO_DATA
        value: "true"
      - key: ENABLE_DOCUMENT_AI_ANALYSIS
        value: "true"
      - key: ENABLE_SUMSUB_LIVE
        value: "false"
      - key: ENABLE_SUMSUB_SANDBOX
        value: "true"
      - key: ENABLE_REAL_SCREENING
        value: "false"
      - key: ENABLE_SIMULATED_SCREENING
        value: "true"
      - key: REQUIRE_REAL_API_KEYS
        value: "false"
      # ── Demo live-data flags (set true + provide API keys for live screening in demo) ──
      - key: DEMO_USE_LIVE_SCREENING
        value: "false"
      - key: DEMO_USE_LIVE_DOCUMENT_AI
        value: "false"
      # ── ComplyAdvantage credentials (set in Render dashboard for live screening) ──
      - key: COMPLYADVANTAGE_API_KEY
        sync: false
      # ── Anthropic credentials (set in Render dashboard for live document AI) ──
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: ENABLE_DEBUG_ENDPOINTS
        value: "true"
      - key: ENABLE_SHORTCUT_LOGIN
        value: "true"
      # Admin password for seeding officer accounts on first init
      - key: ADMIN_INITIAL_PASSWORD
        value: "Onboarda2026!"
      # Demo credentials (read by environment.py, served to frontend)
      - key: DEMO_PORTAL_PASSWORD
        value: "Arie2026!"
      - key: DEMO_BACKOFFICE_PASSWORD
        value: "Onboarda2026!"
      - key: DEMO_CLIENT_PASSWORD
        value: "DemoPass2026!"
