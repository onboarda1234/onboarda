name: Deploy to Staging

on:
  workflow_dispatch:  # Manual trigger from GitHub UI
  push:
    branches: [main]

# Prevent concurrent deployments
concurrency:
  group: deploy-staging
  cancel-in-progress: false

env:
  AWS_REGION: af-south-1
  ECR_REPOSITORY: regmind-backend
  ECS_CLUSTER: regmind-staging
  ECS_SERVICE: regmind-backend
  ECS_TASK_FAMILY: regmind-staging
  ECS_WORKER_SERVICE: regmind-verification-worker
  ECS_WORKER_TASK_FAMILY: regmind-verification-worker

jobs:
  # Run CI first
  ci:
    uses: ./.github/workflows/ci.yml

  deploy:
    runs-on: ubuntu-latest
    needs: ci
    environment: staging
    defaults:
      run:
        working-directory: arie-backend

    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@7474bc4690e29a8392af63c5b98e7449536d5c3a # v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@d539f0932e70871a027e9d5a9d8fc38589180a64 # v2

      - name: Copy HTML files into backend dir
        run: |
          cp ../arie-portal.html ./arie-portal.html
          cp ../arie-backoffice.html ./arie-backoffice.html
          echo "HTML files copied"

      - name: Build and push Docker image
        id: build-image
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          IMAGE_TAG: ${{ github.sha }}
        run: |
          BUILD_TIME=$(date -u +"%Y-%m-%dT%H:%M:%SZ")
          docker build --platform linux/amd64 \
            --build-arg "GIT_SHA=${{ github.sha }}" \
            --build-arg "BUILD_TIME=$BUILD_TIME" \
            --build-arg "IMAGE_TAG=$IMAGE_TAG" \
            --label "git.sha=${{ github.sha }}" \
            --label "git.ref=${{ github.ref }}" \
            --label "build.time=$BUILD_TIME" \
            -t $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG .
          docker push $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG
          echo "image=$ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG" >> $GITHUB_OUTPUT
          echo "git_sha=${{ github.sha }}" >> $GITHUB_OUTPUT
          echo "build_time=$BUILD_TIME" >> $GITHUB_OUTPUT
          echo "image_tag=$IMAGE_TAG" >> $GITHUB_OUTPUT
          echo "Pushed $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG"

      - name: Register new task definition with SHA-pinned image
        id: register-task-def
        env:
          NEW_IMAGE: ${{ steps.build-image.outputs.image }}
          GIT_SHA: ${{ steps.build-image.outputs.git_sha }}
          BUILD_TIME: ${{ steps.build-image.outputs.build_time }}
          IMAGE_TAG: ${{ steps.build-image.outputs.image_tag }}
        run: |
          echo "Fetching current task definition for family: $ECS_TASK_FAMILY"
          TASK_DEF=$(aws ecs describe-task-definition \
            --task-definition $ECS_TASK_FAMILY \
            --region $AWS_REGION \
            --query 'taskDefinition' \
            --output json)

          # Update the container image to the new SHA-tagged image
          NEW_TASK_DEF=$(echo "$TASK_DEF" | python3 -c "
          import json, sys
          td = json.load(sys.stdin)
          # Update the first container's image
          container = td['containerDefinitions'][0]
          container['image'] = '$NEW_IMAGE'
          env = container.setdefault('environment', [])

          def upsert_env(name, value):
              for item in env:
                  if item.get('name') == name:
                      item['value'] = value
                      return
              env.append({'name': name, 'value': value})

          # Phase 7 staging quick win: reject over-10MB document uploads in the browser
          # before the request body is sent. Defaults remain off in code; staging opts in.
          upsert_env('FF_SIZE_CAP_CLIENT_REJECT', 'true')
          # Build provenance must track the image being deployed. ECS task
          # env values override Dockerfile ENV values, so stale task
          # definitions can otherwise make /api/version report an old SHA.
          upsert_env('ENVIRONMENT', 'staging')
          upsert_env('SERVICE_NAME', 'regmind-backend')
          upsert_env('GIT_SHA', '$GIT_SHA')
          upsert_env('BUILD_TIME', '$BUILD_TIME')
          upsert_env('IMAGE_TAG', '$IMAGE_TAG')
          # Remove fields that can't be passed to register-task-definition
          for key in ['taskDefinitionArn', 'revision', 'status', 'requiresAttributes',
                      'compatibilities', 'registeredAt', 'registeredBy']:
              td.pop(key, None)
          json.dump(td, sys.stdout)
          ")

          echo "$NEW_TASK_DEF" > /tmp/new-task-def.json
          NEW_ARN=$(aws ecs register-task-definition \
            --cli-input-json file:///tmp/new-task-def.json \
            --region $AWS_REGION \
            --query 'taskDefinition.taskDefinitionArn' \
            --output text)

          echo "task-definition-arn=$NEW_ARN" >> $GITHUB_OUTPUT
          echo "Registered new task definition: $NEW_ARN"

      - name: Register verification worker task definition with SHA-pinned image
        id: register-worker-task-def
        env:
          NEW_IMAGE: ${{ steps.build-image.outputs.image }}
          GIT_SHA: ${{ steps.build-image.outputs.git_sha }}
          BUILD_TIME: ${{ steps.build-image.outputs.build_time }}
          IMAGE_TAG: ${{ steps.build-image.outputs.image_tag }}
        run: |
          echo "Fetching current worker task definition for family: $ECS_WORKER_TASK_FAMILY"
          TASK_DEF=$(aws ecs describe-task-definition \
            --task-definition $ECS_WORKER_TASK_FAMILY \
            --region $AWS_REGION \
            --query 'taskDefinition' \
            --output json)
          export TASK_DEF

          NEW_TASK_DEF=$(python3 - <<'PY'
          import json
          import os
          import sys

          td = json.loads(os.environ["TASK_DEF"])
          container = td["containerDefinitions"][0]
          container["image"] = os.environ["NEW_IMAGE"]
          container["command"] = container.get("command") or [
              "python",
              "verification_worker.py",
              "--poll-interval",
              "1",
          ]
          env = container.setdefault("environment", [])

          def upsert_env(name, value):
              for item in env:
                  if item.get("name") == name:
                      item["value"] = value
                      return
              env.append({"name": name, "value": value})

          # Keep worker provenance aligned with the API image. ECS task
          # env values override Dockerfile ENV values, so stale task
          # definitions can otherwise keep reporting and running old SHAs.
          upsert_env("ENVIRONMENT", "staging")
          upsert_env("SERVICE_NAME", "regmind-verification-worker")
          upsert_env("GIT_SHA", os.environ["GIT_SHA"])
          upsert_env("BUILD_TIME", os.environ["BUILD_TIME"])
          upsert_env("IMAGE_TAG", os.environ["IMAGE_TAG"])
          for key in [
              "taskDefinitionArn",
              "revision",
              "status",
              "requiresAttributes",
              "compatibilities",
              "registeredAt",
              "registeredBy",
          ]:
              td.pop(key, None)
          json.dump(td, sys.stdout)
          PY
          )

          echo "$NEW_TASK_DEF" > /tmp/new-worker-task-def.json
          NEW_WORKER_ARN=$(aws ecs register-task-definition \
            --cli-input-json file:///tmp/new-worker-task-def.json \
            --region $AWS_REGION \
            --query 'taskDefinition.taskDefinitionArn' \
            --output text)

          echo "task-definition-arn=$NEW_WORKER_ARN" >> $GITHUB_OUTPUT
          echo "Registered new worker task definition: $NEW_WORKER_ARN"

      - name: Deploy to ECS (rolling update)
        env:
          TASK_DEF_ARN: ${{ steps.register-task-def.outputs.task-definition-arn }}
        run: |
          echo "Deploying task definition: $TASK_DEF_ARN"
          aws ecs update-service \
            --cluster $ECS_CLUSTER \
            --service $ECS_SERVICE \
            --task-definition "$TASK_DEF_ARN" \
            --force-new-deployment \
            --region $AWS_REGION > /dev/null

          echo "Waiting for service to stabilize (up to 10 min)..."
          if ! aws ecs wait services-stable \
            --cluster $ECS_CLUSTER \
            --services $ECS_SERVICE \
            --region $AWS_REGION; then
            echo "WARNING: ECS service did not stabilize within timeout"
            echo "Proceeding to health check to determine actual state..."
          fi

      - name: Deploy verification worker to ECS (rolling update)
        env:
          WORKER_TASK_DEF_ARN: ${{ steps.register-worker-task-def.outputs.task-definition-arn }}
        run: |
          echo "Deploying verification worker task definition: $WORKER_TASK_DEF_ARN"
          aws ecs update-service \
            --cluster $ECS_CLUSTER \
            --service $ECS_WORKER_SERVICE \
            --task-definition "$WORKER_TASK_DEF_ARN" \
            --force-new-deployment \
            --region $AWS_REGION > /dev/null

          echo "Waiting for verification worker service to stabilize (up to 10 min)..."
          if ! aws ecs wait services-stable \
            --cluster $ECS_CLUSTER \
            --services $ECS_WORKER_SERVICE \
            --region $AWS_REGION; then
            echo "FAIL: verification worker service did not stabilize within timeout"
            aws ecs describe-services \
              --cluster $ECS_CLUSTER \
              --services $ECS_WORKER_SERVICE \
              --region $AWS_REGION \
              --query 'services[0].deployments' \
              --output json || true
            exit 1
          fi

      # ops-enforce-staging-sha-alignment-gate (code half): before any validation
      # counts, PROVE staging is actually running the SHA we just built. Each
      # service must now point at the exact task definition we registered for
      # this commit, and that task definition's image tag + GIT_SHA/IMAGE_TAG env
      # (the values /api/version reports) must equal github.sha. Fails the deploy
      # run on any drift, so a stale-SHA staging can never be signed off as valid.
      - name: Enforce staging SHA alignment
        env:
          EXPECTED_SHA: ${{ github.sha }}
          EXPECTED_BACKEND_TD_ARN: ${{ steps.register-task-def.outputs.task-definition-arn }}
          EXPECTED_WORKER_TD_ARN: ${{ steps.register-worker-task-def.outputs.task-definition-arn }}
        run: |
          set -euo pipefail
          fail=0

          assert_service_sha() {
            local svc="$1" expected_td_arn="$2"
            echo "── Checking $svc ──"
            local live_td_arn
            live_td_arn=$(aws ecs describe-services \
              --cluster "$ECS_CLUSTER" --services "$svc" --region "$AWS_REGION" \
              --query 'services[0].taskDefinition' --output text)
            if [ "$live_td_arn" != "$expected_td_arn" ]; then
              echo "FAIL: $svc is running task def '$live_td_arn', expected '$expected_td_arn'"
              fail=1
              return
            fi
            local container_json
            container_json=$(aws ecs describe-task-definition \
              --task-definition "$live_td_arn" --region "$AWS_REGION" \
              --query 'taskDefinition.containerDefinitions[0]' --output json)
            EXPECTED_SHA="$EXPECTED_SHA" SVC="$svc" python3 - "$container_json" <<'PY'
          import json, os, sys
          expected = os.environ["EXPECTED_SHA"]
          svc = os.environ["SVC"]
          c = json.loads(sys.argv[1])
          env = {e["name"]: e.get("value") for e in c.get("environment", [])}
          image = c.get("image", "")
          image_tag = image.rsplit(":", 1)[-1] if ":" in image else ""
          problems = []
          if image_tag != expected:
              problems.append(f"image tag '{image_tag}' != '{expected}'")
          if env.get("GIT_SHA") != expected:
              problems.append(f"GIT_SHA env '{env.get('GIT_SHA')}' != '{expected}'")
          if env.get("IMAGE_TAG") != expected:
              problems.append(f"IMAGE_TAG env '{env.get('IMAGE_TAG')}' != '{expected}'")
          if problems:
              print(f"FAIL: {svc}: " + "; ".join(problems))
              sys.exit(1)
          print(f"OK: {svc} aligned to {expected} (image tag + GIT_SHA + IMAGE_TAG)")
          PY
            if [ "$?" -ne 0 ]; then fail=1; fi
          }

          assert_service_sha "$ECS_SERVICE" "$EXPECTED_BACKEND_TD_ARN"
          assert_service_sha "$ECS_WORKER_SERVICE" "$EXPECTED_WORKER_TD_ARN"

          if [ "$fail" -ne 0 ]; then
            echo "Staging SHA alignment gate FAILED — staging is not running $EXPECTED_SHA."
            exit 1
          fi
          echo "Staging SHA alignment gate PASSED — backend + worker both running $EXPECTED_SHA."

      # Optional runtime confirmation: if a staging bearer token is configured,
      # also assert the LIVE /api/version reports the SHA (runtime truth, not just
      # the registered task def). Skips cleanly when the secret is absent so this
      # code half can ship before ops provisions STAGING_VERSION_BEARER_TOKEN.
      - name: Confirm runtime /api/version SHA (optional)
        env:
          EXPECTED_SHA: ${{ github.sha }}
          STAGING_VERSION_BEARER_TOKEN: ${{ secrets.STAGING_VERSION_BEARER_TOKEN }}
        run: |
          set -uo pipefail
          if [ -z "${STAGING_VERSION_BEARER_TOKEN:-}" ]; then
            echo "STAGING_VERSION_BEARER_TOKEN not configured — skipping runtime /api/version check."
            echo "(Task-definition SHA gate above already enforced the deployed artifact.)"
            exit 0
          fi
          for i in $(seq 1 12); do
            BODY=$(curl -sf -H "Authorization: Bearer $STAGING_VERSION_BEARER_TOKEN" \
              https://staging.regmind.co/api/version 2>/dev/null || true)
            RUNTIME_SHA=$(printf '%s' "$BODY" | python3 -c "import json,sys; print(json.load(sys.stdin).get('git_sha',''))" 2>/dev/null || true)
            if [ "$RUNTIME_SHA" = "$EXPECTED_SHA" ]; then
              echo "Runtime /api/version git_sha == $EXPECTED_SHA — confirmed."
              exit 0
            fi
            echo "Attempt $i: runtime git_sha='$RUNTIME_SHA' (want '$EXPECTED_SHA') — retrying in 10s..."
            sleep 10
          done
          echo "FAIL: runtime /api/version never reported $EXPECTED_SHA."
          exit 1

      - name: Verify deployment health
        run: |
          echo "Waiting for public liveness check..."
          for i in $(seq 1 30); do
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" https://staging.regmind.co/api/liveness 2>/dev/null)
            if [ "$STATUS" = "200" ]; then
              echo "Liveness check PASSED after ${i}0s"
              LIVENESS=$(curl -sf https://staging.regmind.co/api/liveness)
              echo "Response: $LIVENESS"
              break
            fi
            echo "Attempt $i: HTTP $STATUS — retrying in 10s..."
            sleep 10
            if [ "$i" -eq 30 ]; then
              echo "FAIL: Liveness check did not pass within 5 minutes"
              # Show health endpoint for diagnostics
              curl -sf https://staging.regmind.co/api/health 2>/dev/null || true
              exit 1
            fi
          done

          # Also check liveness
          HEALTH_STATUS=$(curl -s -o /dev/null -w "%{http_code}" https://staging.regmind.co/api/health 2>/dev/null)
          echo "Health endpoint: HTTP $HEALTH_STATUS"

      - name: Verify portal and backoffice
        run: |
          PORTAL=$(curl -sf -o /dev/null -w "%{http_code}" https://staging.regmind.co/portal)
          BACKOFFICE=$(curl -sf -o /dev/null -w "%{http_code}" https://staging.regmind.co/backoffice)
          echo "Portal: HTTP $PORTAL"
          echo "Backoffice: HTTP $BACKOFFICE"
          if [ "$PORTAL" != "200" ] || [ "$BACKOFFICE" != "200" ]; then
            echo "FAIL: Portal or backoffice not returning 200"
            exit 1
          fi
          echo "All endpoints verified"

      - name: Deployment summary
        if: always()
        run: |
          echo "## Deployment Summary" >> $GITHUB_STEP_SUMMARY
          echo "- **Image:** ${{ steps.build-image.outputs.image }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Task Definition:** ${{ steps.register-task-def.outputs.task-definition-arn }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Worker Task Definition:** ${{ steps.register-worker-task-def.outputs.task-definition-arn }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Commit:** ${{ github.sha }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Triggered by:** ${{ github.actor }}" >> $GITHUB_STEP_SUMMARY
