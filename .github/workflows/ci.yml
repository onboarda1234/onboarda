name: ARIE Finance CI/CD

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install dependencies
        run: |
          pip install ruff
          pip install -r arie-backend/requirements.txt
      - name: Lint with ruff
        run: ruff check arie-backend/ --select E,W,F --ignore E501

  test:
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install dependencies
        run: |
          pip install -r arie-backend/requirements.txt
          pip install pytest pytest-asyncio pytest-cov
      - name: Run tests
        working-directory: arie-backend
        run: pytest tests/ -v --tb=short --cov=. --cov-report=term-missing
        env:
          ENVIRONMENT: testing
          SECRET_KEY: test-secret-key-for-ci

  deploy:
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    needs: test
    steps:
      - name: Deploy to Render
        run: echo "Render auto-deploys from main branch"
