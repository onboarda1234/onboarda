name: Onboarda CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: arie-backend

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: arie-backend/requirements.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install flake8 pytest-cov

      - name: Syntax check (py_compile)
        run: |
          python -c "import py_compile; py_compile.compile('server.py', doraise=True)"
          python -c "import py_compile; py_compile.compile('claude_client.py', doraise=True)"
          python -c "import py_compile; py_compile.compile('db.py', doraise=True)"
          python -c "import py_compile; py_compile.compile('observability.py', doraise=True)"
          python -c "import py_compile; py_compile.compile('pdf_generator.py', doraise=True)"
          python -c "import py_compile; py_compile.compile('gdpr.py', doraise=True)"
          echo "All Python files pass syntax check"

      - name: Lint (flake8 — errors only)
        run: |
          flake8 server.py claude_client.py db.py observability.py pdf_generator.py gdpr.py --count --select=E9,F63,F7,F82 --show-source --statistics
        continue-on-error: false

      - name: Run tests with coverage
        env:
          ENVIRONMENT: testing
          SECRET_KEY: ci-test-secret-key
          ADMIN_INITIAL_PASSWORD: CITestPassword123
          COVERAGE_FILE: /tmp/.coverage
        run: |
          pytest tests/ -v --tb=short --cov=. --cov-config=.coveragerc --cov-report=term-missing --cov-report=xml:coverage.xml

      - name: Test count check (minimum 150)
        env:
          ENVIRONMENT: testing
          SECRET_KEY: ci-test-secret-key
          ADMIN_INITIAL_PASSWORD: CITestPassword123
        run: |
          COUNT=$(pytest tests/ --co -q 2>/dev/null | tail -1 | grep -oP '^\d+')
          echo "Test count: $COUNT"
          if [ "$COUNT" -lt 150 ]; then
            echo "FAIL: Only $COUNT tests found. Minimum 150 required."
            exit 1
          fi
          echo "PASS: $COUNT tests (>= 150 minimum)"

      - name: Coverage threshold check
        env:
          ENVIRONMENT: testing
          SECRET_KEY: ci-test-secret-key
          ADMIN_INITIAL_PASSWORD: CITestPassword123
          COVERAGE_FILE: /tmp/.coverage
        run: |
          COV=$(pytest tests/ --cov=. --cov-config=.coveragerc --cov-report=term -q 2>&1 | grep "^TOTAL" | awk '{print $NF}' | tr -d '%')
          echo "Coverage: ${COV}%"
          if [ -z "$COV" ]; then
            echo "WARNING: Could not determine coverage percentage"
            exit 0
          fi
          if [ "$COV" -lt 25 ]; then
            echo "FAIL: Coverage ${COV}% is below 25% minimum"
            exit 1
          fi
          echo "PASS: Coverage ${COV}% (>= 25% minimum)"

  # Sprint 3.5: Docker build + container smoke test
  docker-validate:
    runs-on: ubuntu-latest
    needs: lint-and-test
    defaults:
      run:
        working-directory: arie-backend

    steps:
      - uses: actions/checkout@v4

      - name: Build Docker image
        run: |
          docker build -t arie-backend:ci-test .
          echo "Docker image built successfully"

      - name: Verify image metadata
        run: |
          docker inspect arie-backend:ci-test --format='{{.Config.ExposedPorts}}' | grep -q 8080
          echo "PASS: Port 8080 exposed"
          docker inspect arie-backend:ci-test --format='{{.Config.User}}' | grep -q arie
          echo "PASS: Non-root user configured"

      - name: Container smoke test — startup + health check
        env:
          SECRET_KEY: ci-smoke-test-key
          ADMIN_INITIAL_PASSWORD: CISmokeTest123
        run: |
          # Start container in background
          docker run -d --name arie-smoke \
            -p 8080:8080 \
            -e ENVIRONMENT=testing \
            -e SECRET_KEY=$SECRET_KEY \
            -e ADMIN_INITIAL_PASSWORD=$ADMIN_INITIAL_PASSWORD \
            -e DB_PATH=/app/data/ci_test.db \
            arie-backend:ci-test

          # Wait for startup (max 15 seconds)
          for i in $(seq 1 15); do
            if curl -sf http://localhost:8080/api/health > /dev/null 2>&1; then
              echo "PASS: Health check passed after ${i}s"
              break
            fi
            if [ "$i" -eq 15 ]; then
              echo "FAIL: Health check did not pass within 15 seconds"
              docker logs arie-smoke
              exit 1
            fi
            sleep 1
          done

          # Verify health response is valid JSON
          HEALTH=$(curl -sf http://localhost:8080/api/health)
          echo "Health response: $HEALTH"
          echo "$HEALTH" | python3 -c "import sys,json; json.load(sys.stdin); print('PASS: Valid JSON response')"

          # Verify security headers present
          HEADERS=$(curl -sI http://localhost:8080/api/health)
          echo "$HEADERS" | grep -qi "X-Content-Type-Options" && echo "PASS: Security headers present"
          echo "$HEADERS" | grep -qi "Content-Security-Policy" && echo "PASS: CSP header present"

          # Cleanup
          docker stop arie-smoke && docker rm arie-smoke
          echo "Container smoke test PASSED"
