name: Onboarda CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]
  workflow_call:  # Allow deploy-staging.yml to reuse this workflow

jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: arie-backend

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: arie-backend/requirements.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install flake8 pytest-cov

      - name: Syntax check (all Python files)
        run: |
          find . -name "*.py" -not -path "./tests/*" -not -path "./.venv/*" | while read f; do
            python -c "import py_compile; py_compile.compile('$f', doraise=True)" || exit 1
          done
          echo "All Python files pass syntax check"

      - name: Lint (flake8 — errors only)
        run: |
          find . -name "*.py" -not -path "./tests/*" -not -path "./.venv/*" | xargs flake8 --count --select=E9,F63,F7,F82 --show-source --statistics
        continue-on-error: false

      - name: Run tests with coverage
        env:
          ENVIRONMENT: testing
          SECRET_KEY: ci-test-secret-key
          ADMIN_INITIAL_PASSWORD: CITestPassword123
          COVERAGE_FILE: /tmp/.coverage
        run: |
          pytest tests/ -v --tb=short --ignore=tests/test_pdf_generator.py --cov=. --cov-config=.coveragerc --cov-report=term-missing --cov-report=xml:coverage.xml

      - name: Test count check (minimum 150)
        env:
          ENVIRONMENT: testing
          SECRET_KEY: ci-test-secret-key
          ADMIN_INITIAL_PASSWORD: CITestPassword123
        run: |
          COUNT=$(pytest tests/ --ignore=tests/test_pdf_generator.py --co -q 2>/dev/null | grep -oE '[0-9]+ tests? collected' | grep -oE '^[0-9]+' | head -1)
          echo "Test count: $COUNT"
          if [ -z "$COUNT" ] || [ "$COUNT" -lt 150 ]; then
            echo "FAIL: Only ${COUNT:-0} tests found. Minimum 150 required."
            exit 1
          fi
          echo "PASS: $COUNT tests (>= 150 minimum)"

      - name: Coverage threshold check
        env:
          ENVIRONMENT: testing
          SECRET_KEY: ci-test-secret-key
          ADMIN_INITIAL_PASSWORD: CITestPassword123
          COVERAGE_FILE: /tmp/.coverage
        run: |
          COV=$(pytest tests/ --ignore=tests/test_pdf_generator.py --cov=. --cov-config=.coveragerc --cov-report=term -q 2>&1 | grep "^TOTAL" | awk '{print $NF}' | tr -d '%')
          echo "Coverage: ${COV}%"
          if [ -z "$COV" ]; then
            echo "WARNING: Could not determine coverage percentage"
            exit 0
          fi
          if [ "$COV" -lt 25 ]; then
            echo "FAIL: Coverage ${COV}% is below 25% minimum"
            exit 1
          fi
          echo "PASS: Coverage ${COV}% (>= 25% minimum)"

  docker-validate:
    runs-on: ubuntu-latest
    needs: lint-and-test
    defaults:
      run:
        working-directory: arie-backend

    steps:
      - uses: actions/checkout@v4

      - name: Copy HTML files into backend dir
        run: |
          cp ../arie-portal.html ./arie-portal.html 2>/dev/null || echo "arie-portal.html not in repo root, checking if already in backend dir"
          cp ../arie-backoffice.html ./arie-backoffice.html 2>/dev/null || echo "arie-backoffice.html not in repo root, checking if already in backend dir"
          ls -la arie-portal.html arie-backoffice.html

      - name: Build Docker image
        run: |
          docker build --platform linux/amd64 -t arie-backend:ci-test .
          echo "Docker image built successfully"

      - name: Verify image metadata
        run: |
          docker inspect arie-backend:ci-test --format='{{.Config.ExposedPorts}}' | grep -q 8080
          echo "PASS: Port 8080 exposed"
          docker inspect arie-backend:ci-test --format='{{.Config.User}}' | grep -q arie
          echo "PASS: Non-root user configured"

      - name: Container smoke test — startup + health check
        env:
          SECRET_KEY: ci-smoke-test-key
          ADMIN_INITIAL_PASSWORD: CISmokeTest123
        run: |
          # Start container in background
          docker run -d --name arie-smoke \
            -p 8080:8080 \
            -e ENVIRONMENT=testing \
            -e SECRET_KEY=$SECRET_KEY \
            -e ADMIN_INITIAL_PASSWORD=$ADMIN_INITIAL_PASSWORD \
            -e DB_PATH=/app/data/ci_test.db \
            arie-backend:ci-test

          # Wait for startup (max 15 seconds)
          for i in $(seq 1 15); do
            if curl -sf http://localhost:8080/api/health > /dev/null 2>&1; then
              echo "PASS: Health check passed after ${i}s"
              break
            fi
            if [ "$i" -eq 15 ]; then
              echo "FAIL: Health check did not pass within 15 seconds"
              docker logs arie-smoke
              exit 1
            fi
            sleep 1
          done

          # Verify health response is valid JSON
          HEALTH=$(curl -sf http://localhost:8080/api/health)
          echo "Health response: $HEALTH"
          echo "$HEALTH" | python3 -c "import sys,json; json.load(sys.stdin); print('PASS: Valid JSON response')"

          # Verify readiness endpoint
          READINESS=$(curl -sf http://localhost:8080/api/readiness)
          echo "Readiness response: $READINESS"
          echo "$READINESS" | python3 -c "import sys,json; d=json.load(sys.stdin); assert d.get('ready') is True, f'Readiness not ready: {d}'; print('PASS: Readiness endpoint ok')"

          # Verify security headers present
          HEADERS=$(curl -sI http://localhost:8080/api/health)
          echo "$HEADERS" | grep -qi "X-Content-Type-Options" && echo "PASS: Security headers present"
          echo "$HEADERS" | grep -qi "Content-Security-Policy" && echo "PASS: CSP header present"

          # Cleanup
          docker stop arie-smoke && docker rm arie-smoke
          echo "Container smoke test PASSED"
