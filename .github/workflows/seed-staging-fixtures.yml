name: seed-staging-fixtures

# Path A (real-schema-adapted) staging fixture seeder.
#
# This workflow is deliberately conservative:
#   - manual dispatch only (no schedule, no push trigger)
#   - dry-run is the default; apply requires an explicit input
#   - all safety gates from fixtures/cli.py still apply (ENVIRONMENT=staging,
#     ALLOW_FIXTURE_SEED=1, --confirm I-UNDERSTAND-FIXTURE-WRITE)
#   - apply is additionally gated by the GitHub `staging` Environment so
#     environment-scoped secrets and required-reviewer rules apply
#
# Apply path runs as a one-off ECS/Fargate task on the staging cluster
# (cluster=regmind-staging, task family=regmind-staging, container=regmind-backend).
# The container image already wires DATABASE_URL from AWS Secrets Manager via
# the active task definition, so no DB credentials are exposed to the runner.
# The runner only needs AWS credentials to call ecs:RunTask / ecs:DescribeTasks
# / logs:GetLogEvents (same auth pattern as deploy-staging.yml).

permissions:
  contents: read

on:
  workflow_dispatch:
    inputs:
      mode:
        description: "dry-run or apply"
        required: true
        default: "dry-run"
        type: choice
        options:
          - dry-run
          - apply
      scenarios:
        description: "Comma-separated scenario codes (blank = all)"
        required: false
        default: ""
      confirm_apply:
        description: "Must equal I-UNDERSTAND-FIXTURE-WRITE for apply mode"
        required: false
        default: ""

jobs:
  seed:
    runs-on: ubuntu-latest
    # The `staging` GitHub Environment provides:
    #   - environment-scoped secret STAGING_DATABASE_URL
    #   - required-reviewer gating before the job starts
    # Dry-run, list, and register steps run inside the same job but use
    # ENVIRONMENT=development at the step level so they do not touch the
    # staging DB even when this environment is selected.
    environment: staging
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install backend dependencies
        working-directory: arie-backend
        run: pip install -r requirements.txt

      - name: Show registry
        working-directory: arie-backend
        run: python -m fixtures.cli list

      - name: Dry-run (always)
        working-directory: arie-backend
        env:
          # Local dry-run uses the bundled SQLite path; no DATABASE_URL needed.
          ENVIRONMENT: development
        run: |
          if [ -n "${{ inputs.scenarios }}" ]; then
            python -m fixtures.cli dry-run --scen "${{ inputs.scenarios }}"
          else
            python -m fixtures.cli dry-run
          fi

      - name: Render register
        working-directory: arie-backend
        env:
          ENVIRONMENT: development
        run: python -m fixtures.cli register --out fixtures/REGISTER.md

      - name: Upload register
        uses: actions/upload-artifact@v4
        with:
          name: fixtures-register
          path: arie-backend/fixtures/REGISTER.md

      # ----------------------------------------------------------------
      # Apply step against real staging.
      #
      # Triple-gated:
      #   1. workflow input `mode == apply`
      #   2. workflow input `confirm_apply == I-UNDERSTAND-FIXTURE-WRITE`
      #      (also enforced inside fixtures/cli.py via --confirm)
      #   3. fixtures/cli.py refuses unless ENVIRONMENT=staging and
      #      ALLOW_FIXTURE_SEED=1 are both set
      #
      # Plus the GitHub `staging` Environment can require manual reviewer
      # approval before this job runs at all.
      # ----------------------------------------------------------------
      - name: Confirm apply token
        if: ${{ inputs.mode == 'apply' }}
        run: |
          if [ "${{ inputs.confirm_apply }}" != "I-UNDERSTAND-FIXTURE-WRITE" ]; then
            echo "REFUSED: confirm_apply must equal I-UNDERSTAND-FIXTURE-WRITE" >&2
            exit 2
          fi

      - name: Configure AWS credentials
        if: ${{ inputs.mode == 'apply' }}
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: af-south-1

      - name: Apply (gated, ECS Fargate one-off task)
        if: ${{ inputs.mode == 'apply' }}
        env:
          AWS_REGION: af-south-1
          ECS_CLUSTER: regmind-staging
          ECS_TASK_FAMILY: regmind-staging
          CONTAINER_NAME: regmind-backend
          SUBNETS: subnet-06d572e471e13e00e,subnet-057856991d61eb646
          SECURITY_GROUPS: sg-07668458bac8df943
          ASSIGN_PUBLIC_IP: ENABLED
          LOG_GROUP: /ecs/regmind-staging
          LOG_STREAM_PREFIX: backend
          # Pass scenarios through env so user input never lands inside the
          # shell or JSON via direct `${{ }}` interpolation.
          SCENARIOS: ${{ inputs.scenarios }}
        run: |
          set -euo pipefail

          # Build containerOverrides JSON in Python so the scenarios value is
          # JSON-escaped safely. The container's task definition already
          # injects DATABASE_URL from Secrets Manager and does not set an
          # explicit command/entrypoint, so we override `command` here.
          OVERRIDES=$(python3 - <<'PY'
          import json, os
          cmd = ["python", "-m", "fixtures.cli", "apply",
                 "--confirm", "I-UNDERSTAND-FIXTURE-WRITE"]
          scen = os.environ.get("SCENARIOS", "").strip()
          if scen:
              cmd += ["--scen", scen]
          print(json.dumps({
              "containerOverrides": [
                  {
                      "name": os.environ["CONTAINER_NAME"],
                      "command": cmd,
                      "environment": [
                          {"name": "ENVIRONMENT", "value": "staging"},
                          {"name": "ALLOW_FIXTURE_SEED", "value": "1"},
                      ],
                  }
              ]
          }))
          PY
          )

          echo "Container overrides:"
          echo "$OVERRIDES"

          NETWORK_CFG="awsvpcConfiguration={subnets=[${SUBNETS}],securityGroups=[${SECURITY_GROUPS}],assignPublicIp=${ASSIGN_PUBLIC_IP}}"

          TASK_ARN=$(aws ecs run-task \
            --cluster "$ECS_CLUSTER" \
            --task-definition "$ECS_TASK_FAMILY" \
            --launch-type FARGATE \
            --count 1 \
            --network-configuration "$NETWORK_CFG" \
            --overrides "$OVERRIDES" \
            --region "$AWS_REGION" \
            --query 'tasks[0].taskArn' \
            --output text)

          if [ -z "$TASK_ARN" ] || [ "$TASK_ARN" = "None" ]; then
            echo "REFUSED: failed to start one-off ECS task" >&2
            exit 4
          fi

          TASK_ID="${TASK_ARN##*/}"
          echo "Started ECS task: $TASK_ARN (id=$TASK_ID)"

          echo "Waiting for task to stop (this may take several minutes)..."
          aws ecs wait tasks-stopped \
            --cluster "$ECS_CLUSTER" \
            --tasks "$TASK_ARN" \
            --region "$AWS_REGION"

          echo "Task stopped. Fetching CloudWatch logs..."
          # awslogs stream name pattern: <prefix>/<container_name>/<task_id>
          LOG_STREAM="${LOG_STREAM_PREFIX}/${CONTAINER_NAME}/${TASK_ID}"
          echo "Log group:  $LOG_GROUP"
          echo "Log stream: $LOG_STREAM"
          aws logs get-log-events \
            --log-group-name "$LOG_GROUP" \
            --log-stream-name "$LOG_STREAM" \
            --region "$AWS_REGION" \
            --start-from-head \
            --output text \
            --query 'events[*].message' \
            || echo "(no logs available; check CloudWatch console for $LOG_STREAM)"

          # Surface the container exit code and stop reason for diagnostics
          # before failing the step.
          DESCRIBE=$(aws ecs describe-tasks \
            --cluster "$ECS_CLUSTER" \
            --tasks "$TASK_ARN" \
            --region "$AWS_REGION" \
            --output json)

          EXIT_CODE=$(echo "$DESCRIBE" | python3 -c "
          import json, sys, os
          d = json.load(sys.stdin)
          tasks = d.get('tasks') or []
          if not tasks:
              print('null')
              sys.exit(0)
          name = os.environ['CONTAINER_NAME']
          for c in tasks[0].get('containers', []):
              if c.get('name') == name:
                  print(c.get('exitCode', 'null'))
                  break
          else:
              print('null')
          ")
          STOP_REASON=$(echo "$DESCRIBE" | python3 -c "
          import json, sys
          d = json.load(sys.stdin)
          tasks = d.get('tasks') or []
          print(tasks[0].get('stoppedReason', '') if tasks else '')
          ")

          echo "Container exit code: $EXIT_CODE"
          echo "Stopped reason:      $STOP_REASON"

          if [ "$EXIT_CODE" != "0" ]; then
            echo "REFUSED: ECS one-off task did not exit cleanly (exit=$EXIT_CODE)" >&2
            exit 1
          fi

      - name: Render register (post-apply)
        if: ${{ inputs.mode == 'apply' }}
        working-directory: arie-backend
        env:
          ENVIRONMENT: staging
          DATABASE_URL: ${{ secrets.STAGING_DATABASE_URL }}
        run: python -m fixtures.cli register --out fixtures/REGISTER.staging.md

      - name: Upload register (post-apply)
        if: ${{ inputs.mode == 'apply' }}
        uses: actions/upload-artifact@v4
        with:
          name: fixtures-register-staging
          path: arie-backend/fixtures/REGISTER.staging.md
