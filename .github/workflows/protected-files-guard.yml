name: Protected Files Guard

on:
  pull_request:
    branches: [main, develop]
    types: [opened, synchronize, reopened, ready_for_review, labeled, unlabeled]

permissions:
  contents: read

jobs:
  check-protected-files:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Get changed files
        id: changed
        run: |
          FILES=$(git diff --name-only origin/${{ github.base_ref }}...HEAD)
          echo "files<<EOF" >> $GITHUB_OUTPUT
          echo "$FILES" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT
          echo "Changed files:"
          echo "$FILES"

      - name: Check for protected file modifications
        env:
          HAS_PROTECTED_FILE_OVERRIDE: ${{ contains(github.event.pull_request.labels.*.name, 'protected-file-override') }}
        run: |
          PROTECTED_FILES=(
            "arie-backend/memo_handler.py"
            "arie-backend/rule_engine.py"
            "arie-backend/validation_engine.py"
            "arie-backend/supervisor_engine.py"
            "arie-backend/security_hardening.py"
            "arie-backend/sumsub_client.py"
            "arie-backend/screening.py"
            "arie-backend/auth.py"
            "arie-backend/base_handler.py"
            "arie-backend/change_management.py"
            "arie-backend/gdpr.py"
            "arie-backend/party_utils.py"
            "arie-backend/production_controls.py"
            "arie-backend/pdf_generator.py"
            "arie-backend/claude_client.py"
            "arie-backend/document_verification.py"
            "arie-backend/db.py"
            "arie-backoffice.html"
            "arie-portal.html"
          )

          VIOLATIONS=""
          while IFS= read -r file; do
            for protected in "${PROTECTED_FILES[@]}"; do
              if [ "$file" = "$protected" ]; then
                VIOLATIONS="$VIOLATIONS\n  - $file"
              fi
            done
          done <<< "${{ steps.changed.outputs.files }}"

          if [ -n "$VIOLATIONS" ]; then
            if [ "$HAS_PROTECTED_FILE_OVERRIDE" = "true" ]; then
              echo "PROTECTED FILE GUARD OVERRIDE"
              echo "============================="
              echo "Protected files were modified, but the protected-file-override label is present."
              echo "Changed protected files:"
              echo -e "$VIOLATIONS"
              echo ""
              echo "Merge still requires explicit written approval from the project lead."
              exit 0
            fi

            echo "::error::Protected files were modified without override:$VIOLATIONS"
            echo ""
            echo "PROTECTED FILE GUARD FAILURE"
            echo "============================"
            echo "The following protected files were modified:"
            echo -e "$VIOLATIONS"
            echo ""
            echo "These files are protected by EX-01 through EX-13 audit controls."
            echo "To override, add 'protected-file-override' label to the PR"
            echo "and obtain explicit written approval from the project lead."
            exit 1
          fi

          echo "PASS: No protected files modified"
